name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t canvas:latest .

      - name: Copy compose and deploy
        run: |
          cp docker-compose.yml ~/stacks/canvas/
          cd ~/stacks/canvas
          docker compose up -d --remove-orphans

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>canvas · {{ board_id }}</title>

<!-- CDN dependencies -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.6/marked.min.js?v=2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js?v=2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/atom-one-dark.min.css?v=2">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css?v=2">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js?v=2"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/contrib/auto-render.min.js?v=2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.9.1/mermaid.min.js?v=2"></script>
<script src="https://cdn.jsdelivr.net/npm/fabric@5.3.0/dist/fabric.min.js?v=2"></script>

<style>
  :root {
    --bg: #0d1117;
    --bg-card: #161b22;
    --bg-hover: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --orange: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
    --font: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    height: 100%;
    overflow-x: hidden;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-y: auto;
    overflow-x: hidden;
    overscroll-behavior-y: contain;
    touch-action: manipulation;
    -webkit-overflow-scrolling: touch;
  }

  #header {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  #header .title {
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.5px;
  }

  #header .board-label {
    color: var(--text-dim);
  }

  #header .board-name {
    color: var(--green);
    font-weight: 600;
  }

  #header .status {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
    animation: pulse 2s infinite;
  }

  .status-dot.disconnected {
    background: var(--red);
    animation: none;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  #content {
    max-width: 860px;
    margin: 0 auto;
    padding: 20px;
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 12px;
    animation: fadeIn 0.3s ease;
    overflow-x: auto;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card .meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .card .meta .type-badge {
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 600;
    font-size: 10px;
  }

  .type-badge.markdown { background: #1a3a2a; color: var(--green); }
  .type-badge.html     { background: #2a1a3a; color: var(--purple); }
  .type-badge.code     { background: #1a2a3a; color: var(--accent); }
  .type-badge.image    { background: #2a2a1a; color: var(--orange); }
  .type-badge.video    { background: #2a1a1a; color: var(--red); }
  .type-badge.mermaid  { background: #1a2a2a; color: #56d4dd; }
  .type-badge.clear    { background: #3a1a1a; color: var(--red); }
  .type-badge.draw     { background: #1a2a1a; color: #7ee07e; }
  .type-badge.app      { background: #2a1a2a; color: #e07ee0; }

  .agent-badge {
    font-size: 11px;
    color: var(--text-dim);
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 2px 10px 2px 6px;
    margin-left: 6px;
  }

  .card .meta .timestamp {
    color: var(--text-dim);
    opacity: 0.7;
  }

  /* Markdown content */
  .card.content-markdown h1 { font-size: 1.5em; margin: 16px 0 8px; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 4px; }
  .card.content-markdown h2 { font-size: 1.3em; margin: 14px 0 6px; color: var(--accent); }
  .card.content-markdown h3 { font-size: 1.15em; margin: 12px 0 4px; }
  .card.content-markdown p  { margin: 6px 0; }
  .card.content-markdown ul, .card.content-markdown ol { margin: 6px 0; padding-left: 24px; }
  .card.content-markdown li { margin: 2px 0; }
  .card.content-markdown a  { color: var(--accent); text-decoration: none; }
  .card.content-markdown a:hover { text-decoration: underline; }
  .card.content-markdown blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 12px;
    margin: 8px 0;
    color: var(--text-dim);
  }
  .card.content-markdown pre {
    background: #0d1117;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    margin: 8px 0;
    overflow-x: auto;
  }
  .card.content-markdown code {
    font-family: var(--font);
    font-size: 13px;
  }
  .card.content-markdown p > code,
  .card.content-markdown li > code {
    background: #1c2128;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
  }
  .card.content-markdown table {
    border-collapse: collapse;
    margin: 10px 0;
    width: 100%;
  }
  .card.content-markdown th, .card.content-markdown td {
    border: 1px solid var(--border);
    padding: 6px 12px;
    text-align: left;
  }
  .card.content-markdown th {
    background: #1c2128;
    font-weight: 600;
  }
  .card.content-markdown hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 16px 0;
  }
  .card.content-markdown img {
    max-width: 100%;
    border-radius: 6px;
    margin: 8px 0;
  }

  /* Code blocks */
  .card.content-code pre {
    margin: 0;
    padding: 0;
    background: transparent;
  }
  .card.content-code code {
    font-family: var(--font);
    font-size: 13px;
    line-height: 1.5;
  }

  /* Images */
  .card.content-image img {
    max-width: 100%;
    max-height: 80vh;
    border-radius: 6px;
    display: block;
  }

  /* Video */
  .card.content-video video {
    max-width: 100%;
    border-radius: 6px;
  }
  .card.content-video iframe {
    max-width: 100%;
    border-radius: 6px;
    aspect-ratio: 16/9;
    width: 100%;
  }

  /* Mermaid */
  .card.content-mermaid .mermaid svg {
    max-width: 100%;
    height: auto;
  }

  /* Clear card */
  .card.content-clear {
    border-color: var(--red);
    text-align: center;
    font-style: italic;
    color: var(--text-dim);
  }

  /* Draw — SVG */
  .card.content-draw {
    padding: 0;
    overflow: hidden;
  }
  .card.content-draw .draw-container {
    width: 100%;
    overflow: auto;
    cursor: grab;
    position: relative;
  }
  .card.content-draw .draw-container:active {
    cursor: grabbing;
  }
  .card.content-draw svg {
    display: block;
    width: 100%;
    height: auto;
    max-height: 70vh;
    background: #0a0e14;
  }
  .card.content-draw .draw-svg-wrap {
    overflow: hidden;
    width: 100%;
  }
  .card.content-draw .draw-canvas text {
    user-select: none;
    pointer-events: none;
  }

  /* App — HTML sandbox */
  .card.content-app {
    padding: 0;
    overflow: hidden;
  }
  .card.content-app .app-container {
    display: flex;
    flex-direction: column;
  }
  .card.content-app .app-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: #1a1a2e;
    border-bottom: 1px solid var(--border);
  }
  .card.content-app .app-title {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .card.content-app .app-fullscreen-btn {
    margin-left: auto;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 2px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-family: var(--font);
    font-size: 11px;
    transition: all 0.2s;
  }
  .card.content-app .app-fullscreen-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .card.content-app .app-iframe {
    width: 100%;
    min-height: 400px;
    border: none;
    display: block;
  }

  /* Overview / empty state */
  #empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
  }
  #empty-state .emoji { font-size: 48px; display: block; margin-bottom: 16px; }
  #empty-state h2 { color: var(--text-dim); font-weight: 400; margin-bottom: 8px; }
  #empty-state p { font-size: 13px; }

  .hljs {
    background: transparent !important;
    padding: 0 !important;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* Clear button */
  #clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--font);
    font-size: 12px;
    transition: all 0.2s;
  }
  #clear-btn:hover {
    border-color: var(--red);
    color: var(--red);
  }

  /* ─── Permalink ────────────────────────────────────────────────────── */
  .permalink-btn {
    cursor: pointer;
    opacity: 0.3;
    font-size: 11px;
    transition: opacity 0.2s;
    margin-left: auto;
    padding: 2px 4px;
    border-radius: 4px;
    user-select: none;
  }
  .permalink-btn:hover {
    opacity: 1;
    background: rgba(255,255,255,0.06);
  }

  /* ─── Toast ────────────────────────────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a2a1e;
    border: 1px solid var(--green);
    color: var(--green);
    padding: 8px 20px;
    border-radius: 8px;
    font-family: var(--font);
    font-size: 13px;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ─── Mode Toggle ─────────────────────────────────────────────────── */
  #mode-toggle {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--font);
    font-size: 12px;
    transition: all 0.2s;
  }
  #mode-toggle:hover {
    border-color: var(--purple);
    color: var(--purple);
  }
  #mode-toggle.active {
    border-color: var(--purple);
    color: var(--purple);
    background: rgba(188,140,255,0.08);
  }

  /* ─── Whiteboard Mode ─────────────────────────────────────────────── */
  #whiteboard-mode {
    display: none;
    position: fixed;
    top: 48px;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 50;
    background: var(--bg);
  }
  #whiteboard-mode.active {
    display: flex;
    flex-direction: column;
  }

  #wb-toolbar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: #1a1a2e;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  #wb-toolbar .wb-tool {
    background: none;
    border: 1px solid transparent;
    color: var(--text-dim);
    width: 32px;
    height: 28px;
    border-radius: 4px;
    cursor: pointer;
    font-family: var(--font);
    font-size: 14px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #wb-toolbar .wb-tool:hover {
    border-color: var(--border);
    color: var(--text);
    background: var(--bg-hover);
  }
  #wb-toolbar .wb-tool.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(88,166,255,0.1);
  }

  .wb-sep {
    width: 1px;
    height: 20px;
    background: var(--border);
    display: inline-block;
  }

  #wb-toolbar label {
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
  }
  #wb-toolbar input[type="color"] {
    width: 26px;
    height: 22px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    cursor: pointer;
    padding: 0;
  }
  #wb-toolbar input[type="color"]::-webkit-color-swatch-wrapper {
    padding: 2px;
  }
  #wb-toolbar input[type="color"]::-webkit-color-swatch {
    border: none;
    border-radius: 2px;
  }
  #wb-toolbar input[type="range"] {
    width: 60px;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  #wb-toolbar input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  #wb-undo, #wb-clear {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 2px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-family: var(--font);
    font-size: 12px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  #wb-undo:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  #wb-clear:hover {
    border-color: var(--red);
    color: var(--red);
  }

  #wb-canvas-container {
    flex: 1;
    overflow: hidden;
    position: relative;
    cursor: default;
  }
  #wb-canvas-container.panning {
    cursor: grab;
  }
  #wb-canvas-container.panning:active {
    cursor: grabbing;
  }

  /* Hide feed in whiteboard mode via display:none on #whiteboard-mode.active + sibling #content */
  body.wb-mode #content {
    display: none;
  }

  /* Connection debug */
  #debug-info {
    display: none;
  }
</style>
</head>
<body>

<div id="header">
  <span class="title">canvas</span>
  <span class="board-label">/</span>
  <span class="board-name" id="board-name">{{ board_id }}</span>
  <span class="status">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">connecting</span>
    <button id="mode-toggle" title="Toggle between feed and whiteboard mode">✏️ Whiteboard</button>
    <button id="clear-btn" title="Clear this board">× clear</button>
  </span>
</div>

<div id="content">
  <div id="empty-state">
    <span class="emoji">🖼️</span>
    <h2>Waiting for content…</h2>
    <p>Push content with <code>POST /push</code></p>
  </div>
</div>

<!-- Whiteboard Mode -->
<div id="whiteboard-mode">
  <div id="wb-toolbar">
    <button data-tool="select"    class="wb-tool active" title="Select / Pan">⬚</button>
    <button data-tool="pencil"    class="wb-tool" title="Freehand draw">✏️</button>
    <button data-tool="rect"      class="wb-tool" title="Rectangle">▭</button>
    <button data-tool="circle"    class="wb-tool" title="Circle">○</button>
    <button data-tool="line"      class="wb-tool" title="Line">╱</button>
    <button data-tool="text"      class="wb-tool" title="Text">T</button>
    <button data-tool="erase"     class="wb-tool" title="Erase">🧹</button>
    <span class="wb-sep"></span>
    <label>Stroke <input type="color" id="wb-stroke" value="#58a6ff"></label>
    <label>Fill <input type="color" id="wb-fill" value="#0d1117"></label>
    <label>Size <input type="range" id="wb-size" min="1" max="20" value="3"></label>
    <span class="wb-sep"></span>
    <button id="wb-undo" title="Undo last action">↩ Undo</button>
    <button id="wb-clear" title="Clear canvas">🗑 Clear</button>
  </div>
  <div id="wb-canvas-container">
    <canvas id="wb-canvas"></canvas>
  </div>
</div>

<!-- Load More button -->
<div id="load-more-container" style="display:none; text-align:center; padding:20px;">
  <button id="load-more-btn" style="background:var(--bg-card); border:1px solid var(--border); color:var(--accent); padding:8px 24px; border-radius:6px; cursor:pointer; font-family:var(--font); font-size:13px; transition:all 0.2s;">
    Load 20 more
  </button>
  <div id="load-more-status" style="color:var(--text-dim); font-size:12px; margin-top:8px;"></div>
</div>

<!-- Toast notification -->
<div id="toast"></div>

<script>
// ─── Configuration ────────────────────────────────────────────────────────
const BOARD_ID = {{ board_id | tojson }};
const HISTORY_URL = `/history/${BOARD_ID}`;
const STREAM_URL  = `/stream/${BOARD_ID}`;
const PUSH_URL    = `/push`;

// ─── State ────────────────────────────────────────────────────────────────
let contentEl = document.getElementById('content');
let emptyState = document.getElementById('empty-state');
let statusDot = document.getElementById('status-dot');
let statusText = document.getElementById('status-text');
let clearBtn = document.getElementById('clear-btn');
let modeToggle = document.getElementById('mode-toggle');
let whiteboardMode = document.getElementById('whiteboard-mode');
let toastEl = document.getElementById('toast');

// ─── Pagination State ────────────────────────────────────────────────────
let oldestTimestamp = null;   // oldest card timestamp currently shown
let totalCards = 0;           // total non-expired cards on this board
let loadedCount = 0;          // how many cards we've loaded (approximate)
const PAGE_SIZE = 20;

// ─── Mermaid init ─────────────────────────────────────────────────────────
if (typeof mermaid !== 'undefined') {
  mermaid.initialize({
  startOnLoad: false,
  theme: 'dark',
  securityLevel: 'loose',
  fontFamily: '"JetBrains Mono", "Fira Code", monospace',
  themeVariables: {
    background: '#161b22',
    primaryColor: '#58a6ff',
    secondaryColor: '#3fb950',
    tertiaryColor: '#d29922',
    primaryBorderColor: '#30363d',
    secondaryBorderColor: '#30363d',
    tertiaryBorderColor: '#30363d',
    primaryTextColor: '#e6edf3',
    secondaryTextColor: '#e6edf3',
    tertiaryTextColor: '#e6edf3',
    lineColor: '#8b949e',
    textColor: '#e6edf3',
    mainBkg: '#161b22',
    nodeBorder: '#30363d',
  }
  });
} else {
  console.warn('mermaid.js not loaded — diagram rendering disabled');
}

// ─── Toast ────────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg, duration) {
  duration = duration || 1800;
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    toastEl.classList.remove('show');
  }, duration);
}

// ─── Helpers ──────────────────────────────────────────────────────────────

function formatTime(ts) {
  const d = new Date(ts * 1000);
  return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function createCard(item) {
  const card = document.createElement('div');
  card.className = `card content-${item.type}`;
  card.id = 'card-' + item.id;

  // Meta row
  const meta = document.createElement('div');
  meta.className = 'meta';

  const badge = document.createElement('span');
  badge.className = `type-badge ${item.type}`;
  badge.textContent = item.type.toUpperCase();
  meta.appendChild(badge);

  // Agent identity badge
  if (item.agent) {
    const agent = document.createElement('span');
    agent.className = 'agent-badge';
    agent.textContent = (item.agent_emoji || '🤖') + ' ' + item.agent;
    meta.appendChild(agent);
  }

  const time = document.createElement('span');
  time.className = 'timestamp';
  time.textContent = formatTime(item.timestamp);
  meta.appendChild(time);

  // Permalink button
  const permalink = document.createElement('span');
  permalink.className = 'permalink-btn';
  permalink.textContent = '🔗';
  permalink.title = 'Copy permalink';
  permalink.addEventListener('click', function(e) {
    e.stopPropagation();
    const url = 'https://canvas.wodinga.studio/card/' + item.id;
    navigator.clipboard.writeText(url).then(() => {
      showToast('Copied!');
    }).catch(() => {
      // Fallback for older browsers
      const ta = document.createElement('textarea');
      ta.value = url;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('Copied!');
    });
  });
  meta.appendChild(permalink);

  card.appendChild(meta);

  // Content area
  const body = document.createElement('div');
  body.className = 'body';

  switch (item.type) {
    case 'markdown':
      if (typeof marked !== 'undefined') {
        body.innerHTML = marked.parse(item.content);
      } else {
        body.innerHTML = `<pre>${escapeHtml(item.content)}</pre>`;
        console.warn('marked.js not loaded — markdown rendering degraded to plain text');
      }
      // Render KaTeX
      if (typeof renderMathInElement !== 'undefined') {
        renderMathInElement(body, {
          delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false},
            {left: '\\(', right: '\\)', display: false},
            {left: '\\[', right: '\\]', display: true}
          ],
          throwOnError: false
        });
      }
      // Highlight code blocks
      if (typeof hljs !== 'undefined') {
        body.querySelectorAll('pre code').forEach(block => {
          hljs.highlightElement(block);
        });
      }
      break;

    case 'html':
      body.innerHTML = item.content;
      break;

    case 'code':
      body.innerHTML = `<pre><code>${escapeHtml(item.content)}</code></pre>`;
      if (typeof hljs !== 'undefined') {
        body.querySelectorAll('pre code').forEach(block => {
          hljs.highlightElement(block);
        });
      }
      break;

    case 'image':
      body.innerHTML = `<img src="${escapeHtml(item.content)}" alt="canvas image" loading="lazy">`;
      break;

    case 'video':
      // Check if it's a YouTube URL
      const ytMatch = item.content.match(
        /(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]+)/
      );
      if (ytMatch) {
        body.innerHTML = `<iframe src="https://www.youtube.com/embed/${ytMatch[1]}?autoplay=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
      } else {
        body.innerHTML = `<video controls autoplay><source src="${escapeHtml(item.content)}" type="video/mp4">Your browser does not support video.</video>`;
      }
      break;

    case 'mermaid':
      const mermaidId = 'mermaid-' + item.id;
      body.innerHTML = `<pre class="mermaid" id="${mermaidId}">${escapeHtml(item.content)}</pre>`;
      // Render mermaid — use body.querySelector because element isn't in DOM yet
      if (typeof mermaid !== 'undefined') {
        try {
          const mermaidEl = body.querySelector('#' + mermaidId);
          if (mermaidEl) {
            mermaid.run({ nodes: [mermaidEl] });
          }
        } catch(e) {
          console.warn('Mermaid render error:', e);
          body.innerHTML = `<pre>${escapeHtml(item.content)}</pre>`;
        }
      } else {
        body.innerHTML = `<pre>${escapeHtml(item.content)}</pre>`;
      }
      break;

    case 'draw':
      const shapes = item.content.shapes || [];
      // Calculate bounding box
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      shapes.forEach(s => {
        if (s.type === 'rect') {
          minX = Math.min(minX, s.x, s.x + s.w);
          minY = Math.min(minY, s.y, s.y + s.h);
          maxX = Math.max(maxX, s.x, s.x + s.w);
          maxY = Math.max(maxY, s.y, s.y + s.h);
        } else if (s.type === 'circle') {
          minX = Math.min(minX, s.cx - s.r);
          minY = Math.min(minY, s.cy - s.r);
          maxX = Math.max(maxX, s.cx + s.r);
          maxY = Math.max(maxY, s.cy + s.r);
        } else if (s.type === 'arrow' || s.type === 'line') {
          minX = Math.min(minX, s.x1, s.x2);
          minY = Math.min(minY, s.y1, s.y2);
          maxX = Math.max(maxX, s.x1, s.x2);
          maxY = Math.max(maxY, s.y1, s.y2);
        } else if (s.type === 'text') {
          minX = Math.min(minX, s.x);
          minY = Math.min(minY, s.y - (s.size || 14));
          maxX = Math.max(maxX, s.x + (s.text || '').length * (s.size || 14) * 0.6);
          maxY = Math.max(maxY, s.y + 4);
        }
      });
      if (!isFinite(minX)) { minX = 0; minY = 0; maxX = 800; maxY = 600; }
      const pad = 40;
      const svgW = maxX - minX + pad * 2;
      const svgH = maxY - minY + pad * 2;
      const viewX = minX - pad;
      const viewY = minY - pad;

      let svgContent = '';
      shapes.forEach(s => {
        switch (s.type) {
          case 'rect':
            svgContent += `<rect x="${s.x}" y="${s.y}" width="${s.w}" height="${s.h}" fill="${s.fill || 'none'}" stroke="${s.stroke || '#fff'}" stroke-width="${s['stroke-width'] || 2}" rx="${s.rx || 4}" />`;
            if (s.label) {
              svgContent += `<text x="${s.x + s.w/2}" y="${s.y + s.h/2}" fill="${s['label-color'] || '#fff'}" font-size="${s['label-size'] || 12}" text-anchor="middle" dominant-baseline="middle" font-family="var(--font)">${escapeHtml(s.label)}</text>`;
            }
            break;
          case 'circle':
            svgContent += `<circle cx="${s.cx}" cy="${s.cy}" r="${s.r}" fill="${s.fill || 'none'}" stroke="${s.stroke || '#fff'}" stroke-width="${s['stroke-width'] || 2}" />`;
            if (s.label) {
              svgContent += `<text x="${s.cx}" y="${s.cy}" fill="${s['label-color'] || '#fff'}" font-size="${s['label-size'] || 12}" text-anchor="middle" dominant-baseline="middle" font-family="var(--font)">${escapeHtml(s.label)}</text>`;
            }
            break;
          case 'line':
            svgContent += `<line x1="${s.x1}" y1="${s.y1}" x2="${s.x2}" y2="${s.y2}" stroke="${s.stroke || '#fff'}" stroke-width="${s['stroke-width'] || 2}" />`;
            break;
          case 'arrow':
            const dx = s.x2 - s.x1, dy = s.y2 - s.y1;
            const angle = Math.atan2(dy, dx);
            const hl = Math.min(12, Math.hypot(dx, dy) * 0.3);
            const ha = Math.PI / 6;
            const ax = s.x2 - hl * Math.cos(angle - ha);
            const ay = s.y2 - hl * Math.sin(angle - ha);
            const bx = s.x2 - hl * Math.cos(angle + ha);
            const by = s.y2 - hl * Math.sin(angle + ha);
            svgContent += `<line x1="${s.x1}" y1="${s.y1}" x2="${s.x2}" y2="${s.y2}" stroke="${s.stroke || '#fff'}" stroke-width="${s['stroke-width'] || 2}" />`;
            svgContent += `<polygon points="${s.x2},${s.y2} ${ax},${ay} ${bx},${by}" fill="${s.stroke || '#fff'}" />`;
            if (s.label) {
              const mx = (s.x1 + s.x2) / 2, my = (s.y1 + s.y2) / 2;
              svgContent += `<text x="${mx}" y="${my - 8}" fill="${s['label-color'] || '#8b949e'}" font-size="11" text-anchor="middle" font-family="var(--font)">${escapeHtml(s.label)}</text>`;
            }
            break;
          case 'text':
            svgContent += `<text x="${s.x}" y="${s.y}" fill="${s.color || '#fff'}" font-size="${s.size || 14}" font-family="var(--font)">${escapeHtml(s.text)}</text>`;
            break;
        }
      });

      body.innerHTML = `<div class="draw-container"><div class="draw-svg-wrap"><svg viewBox="${viewX} ${viewY} ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg"><g class="draw-canvas">${svgContent}</g></svg></div></div>`;

      // SVG zoom/pan
      const svgEl = body.querySelector('svg');
      let isPanning = false, panStart = {x:0,y:0}, panOffset = {x:0,y:0};
      let currentScale = 1;

      body.querySelector('.draw-container').addEventListener('wheel', e => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        currentScale = Math.max(0.2, Math.min(5, currentScale * delta));
        const g = svgEl.querySelector('.draw-canvas');
        g.setAttribute('transform', `translate(${panOffset.x},${panOffset.y}) scale(${currentScale})`);
        g.setAttribute('transform-origin', 'center');
      }, {passive: false});

      svgEl.addEventListener('mousedown', e => {
        if (e.button === 0) {
          isPanning = true;
          panStart = {x: e.clientX - panOffset.x, y: e.clientY - panOffset.y};
          svgEl.style.cursor = 'grabbing';
          e.preventDefault();
        }
      });
      svgEl.addEventListener('mousemove', e => {
        if (!isPanning) return;
        panOffset = {x: e.clientX - panStart.x, y: e.clientY - panStart.y};
        const g = svgEl.querySelector('.draw-canvas');
        g.setAttribute('transform', `translate(${panOffset.x},${panOffset.y}) scale(${currentScale})`);
        e.preventDefault();
      });
      svgEl.addEventListener('mouseup', () => {
        isPanning = false;
        svgEl.style.cursor = '';
      });
      svgEl.addEventListener('mouseleave', () => {
        isPanning = false;
        svgEl.style.cursor = '';
      });
      break;

    case 'app':
      const appHtml = item.content;
      const appTitle = item.title || 'Sandbox';
      const iframeId = 'iframe-' + item.id;
      body.innerHTML = `<div class="app-container"><div class="app-toolbar"><span class="app-title">⧉ ${escapeHtml(appTitle)}</span><button class="app-fullscreen-btn" data-iframe="${iframeId}">⛶ fullscreen</button></div><iframe id="${iframeId}" srcdoc="${escapeHtml(appHtml)}" sandbox="allow-scripts" class="app-iframe"></iframe></div>`;
      const fsBtn = body.querySelector('.app-fullscreen-btn');
      fsBtn.addEventListener('click', () => {
        const iframe = document.getElementById(iframeId);
        if (iframe.requestFullscreen) {
          iframe.requestFullscreen();
        } else if (iframe.webkitRequestFullscreen) {
          iframe.webkitRequestFullscreen();
        }
      });
      break;

    case 'clear':
      card.innerHTML = '';
      const clearMsg = document.createElement('div');
      clearMsg.style.textAlign = 'center';
      clearMsg.style.padding = '20px';
      clearMsg.style.color = 'var(--text-dim)';
      clearMsg.style.fontStyle = 'italic';
      clearMsg.textContent = '── board cleared ──';
      card.appendChild(clearMsg);
      break;
  }

  card.appendChild(body);
  return card;
}

function addCard(item, isHistory) {
  // Remove empty state
  emptyState.style.display = 'none';

  // If clear, wipe all cards
  if (item.type === 'clear') {
    const cards = contentEl.querySelectorAll('.card');
    cards.forEach(c => c.remove());
    const card = createCard(item);
    contentEl.insertBefore(card, contentEl.firstChild);
    // Reset pagination state
    oldestTimestamp = null;
    loadedCount = 0;
    totalCards = 0;
    updateLoadMoreButton();
    return;
  }

  // ── Update existing card if this is an explicit update ────────────
  if (item.action === 'update') {
    const lookupId = 'card-' + item.id;
    console.log('SSE update received:', item.id.slice(0,8), 'looking for #'+lookupId);
    const existing = document.getElementById(lookupId);
    console.log('  Found in DOM:', !!existing);
    if (existing) {
      const newCard = createCard(item);
      existing.parentNode.replaceChild(newCard, existing);
      console.log('  Card replaced');

      // If this card is in the URL hash, re-scroll to it
      if (window.location.hash === '#card-' + item.id) {
        setTimeout(() => {
          newCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 50);
      }
      return;
    } else {
      console.warn('Update target #card-' + item.id.slice(0,8) + ' not in DOM — creating new card');
    }
  }

  // ── Create new card ────────────────────────────────────────────────
  const card = createCard(item);
  contentEl.insertBefore(card, contentEl.firstChild);

  // Track pagination state for SSE-delivered cards
  if (!isHistory && item.id && item.id !== 'clear' && item.action !== 'update') {
    loadedCount++;
    totalCards++;
    updateLoadMoreButton();
  }

  // Update hash to point to this new card (SSE live only, not history)
  if (!isHistory && item.id && item.id !== 'clear') {
    window.location.hash = 'card-' + item.id;
  }
}

function setConnected(connected) {
  statusDot.className = connected ? 'status-dot' : 'status-dot disconnected';
  statusText.textContent = connected ? 'connected' : 'disconnected';
}

// ─── SSE Stream ───────────────────────────────────────────────────────────

function connectSSE() {
  const eventSource = new EventSource(STREAM_URL);

  eventSource.onopen = () => {
    setConnected(true);
  };

  eventSource.onmessage = (event) => {
    if (!event.data || event.data.trim() === '') return;
    try {
      const item = JSON.parse(event.data);
      handleSSEMessage(item);
    } catch (e) {
      console.warn('Failed to parse SSE data:', e);
    }
  };

  eventSource.onerror = () => {
    setConnected(false);
    eventSource.close();
    // Reconnect after 3s
    setTimeout(connectSSE, 3000);
  };
}

// Route SSE messages to the right handler based on current mode
function handleSSEMessage(item) {
  if (isWhiteboardActive && item.type === 'draw') {
    // In whiteboard mode: render draw events on the Fabric canvas
    addShapesToWhiteboard(item.content.shapes);
  } else {
    // Feed mode or non-draw events in whiteboard mode: show as cards
    addCard(item);
  }
}

// ─── Load More Button ─────────────────────────────────────────────────────
const loadMoreBtn = document.getElementById('load-more-btn');
const loadMoreContainer = document.getElementById('load-more-container');
const loadMoreStatus = document.getElementById('load-more-status');

function updateLoadMoreButton() {
  const remaining = totalCards - loadedCount;
  if (remaining <= 0) {
    loadMoreContainer.style.display = 'block';
    loadMoreBtn.style.display = 'none';
    loadMoreStatus.textContent = 'All cards loaded';
    return;
  }
  loadMoreContainer.style.display = 'block';
  loadMoreBtn.style.display = 'inline-block';
  const batchSize = Math.min(PAGE_SIZE, remaining);
  loadMoreBtn.textContent = `Load ${batchSize} more (${remaining} remaining)`;
  loadMoreStatus.textContent = '';
}

loadMoreBtn.addEventListener('click', async () => {
  if (!oldestTimestamp) return;
  loadMoreBtn.disabled = true;
  loadMoreBtn.textContent = 'Loading...';
  try {
    const url = `${HISTORY_URL}?limit=${PAGE_SIZE}&before=${oldestTimestamp}`;
    const response = await fetch(url);
    const data = await response.json();
    if (data.cards && data.cards.length > 0) {
      // data.cards comes oldest-first (chronological), append to bottom
      data.cards.forEach(item => {
        const card = createCard(item);
        contentEl.appendChild(card);
        // Track the oldest timestamp for next page
        if (item.timestamp < oldestTimestamp) {
          oldestTimestamp = item.timestamp;
        }
      });
      loadedCount += data.cards.length;
      // Update total from server response (more accurate)
      totalCards = data.total;
    }
    updateLoadMoreButton();
  } catch (e) {
    console.warn('Failed to load more:', e);
    loadMoreBtn.textContent = 'Error — try again';
  } finally {
    loadMoreBtn.disabled = false;
  }
});

// ─── Load History ─────────────────────────────────────────────────────────

async function loadHistory() {
  try {
    const response = await fetch(`${HISTORY_URL}?limit=${PAGE_SIZE}`);
    const data = await response.json();

    totalCards = data.total || 0;

    // data.cards comes oldest-first (chronological).
    // We need to prepend them newest-first for display.
    const items = data.cards || [];
    if (items.length === 0) {
      // Still might have more than 0 total (edge case), show button
      if (totalCards > 0) {
        updateLoadMoreButton();
      }
      return;
    }

    emptyState.style.display = 'none';

    // items are oldest-first, reverse to newest-first for prepending
    items.slice().reverse().forEach(item => addCard(item, true));

    // Track oldest timestamp for "Load more" button
    oldestTimestamp = items[0].timestamp;  // items[0] is the oldest
    loadedCount = items.length;

    updateLoadMoreButton();

    // Position at top (newest first)
    window.scrollTo({ top: 0, behavior: 'instant' });

    // If hash points to a card, scroll to it after rendering
    if (window.location.hash && window.location.hash.startsWith('#card-')) {
      const targetId = window.location.hash.substring(1);
      // Retry a few times in case DOM hasn't rendered yet
      let attempts = 0;
      const tryScroll = () => {
        const target = document.getElementById(targetId);
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        } else if (attempts < 5) {
          attempts++;
          setTimeout(tryScroll, 200);
        }
      };
      setTimeout(tryScroll, 200);
    }
  } catch (e) {
    console.warn('Failed to load history:', e);
  }
}

// ─── Clear button ─────────────────────────────────────────────────────────

clearBtn.addEventListener('click', async () => {
  try {
    await fetch(PUSH_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ board: BOARD_ID, type: 'clear', content: '' })
    });
  } catch (e) {
    console.warn('Clear failed:', e);
  }
});

// ─── Whiteboard Mode ─────────────────────────────────────────────────────

let isWhiteboardActive = false;
let wbCanvas = null;             // Fabric.Canvas instance
let wbHistory = [];              // JSON snapshots for undo
let wbHistoryIndex = -1;
let currentTool = 'select';
let isPanning = false;
let panStartPoint = null;

const TOOL_NAMES = ['select', 'pencil', 'rect', 'circle', 'line', 'text', 'erase'];

function initWhiteboard() {
  if (typeof fabric === 'undefined') {
    console.warn('fabric.js not loaded — whiteboard mode unavailable');
    showToast('Whiteboard unavailable — fabric.js not loaded', 3000);
    return;
  }

  const container = document.getElementById('wb-canvas-container');
  const canvasEl = document.getElementById('wb-canvas');

  const rect = container.getBoundingClientRect();
  canvasEl.width = rect.width;
  canvasEl.height = rect.height;

  wbCanvas = new fabric.Canvas('wb-canvas', {
    width: rect.width,
    height: rect.height,
    backgroundColor: '#0d1117',
    isDrawingMode: false,
    selection: true,
    preserveObjectStacking: true,
    renderOnAddRemove: true,
    stopContextMenu: true,
    fireRightClick: false,
  });

  // ─── Pan/Zoom ──────────────────────────────────────────────────────
  wbCanvas.on('mouse:wheel', function(opt) {
    const delta = opt.e.deltaY;
    let zoom = wbCanvas.getZoom();
    zoom *= 0.999 ** delta;
    zoom = Math.max(0.2, Math.min(10, zoom));
    wbCanvas.zoomToPoint({ x: opt.e.offsetX, y: opt.e.offsetY }, zoom);
    opt.e.preventDefault();
    opt.e.stopPropagation();
  });

  wbCanvas.on('mouse:down', function(opt) {
    const evt = opt.e;
    if (evt.altKey || evt.button === 1 || currentTool === 'select') {
      // Check if clicking empty space — initiate pan
      if (!opt.target) {
        isPanning = true;
        panStartPoint = { x: evt.clientX, y: evt.clientY };
        container.classList.add('panning');
        wbCanvas.selection = false;
      }
    }
  });

  wbCanvas.on('mouse:move', function(opt) {
    if (isPanning && panStartPoint) {
      const evt = opt.e;
      const vpt = wbCanvas.viewportTransform;
      vpt[4] += evt.clientX - panStartPoint.x;
      vpt[5] += evt.clientY - panStartPoint.y;
      panStartPoint = { x: evt.clientX, y: evt.clientY };
      wbCanvas.requestRenderAll();
    }
  });

  wbCanvas.on('mouse:up', function() {
    if (isPanning) {
      isPanning = false;
      panStartPoint = null;
      container.classList.remove('panning');
      wbCanvas.selection = true;
    }
  });

  // ─── Drawing event handlers ────────────────────────────────────────
  // Pencil (freehand) mode
  wbCanvas.on('path:created', function() {
    saveUndoState();
  });

  // Rectangle: mouse:down creates start; mouse:up creates rect
  let drawStart = null;
  let drawShape = null;

  wbCanvas.on('mouse:down', function(opt) {
    if (['rect', 'circle', 'line'].includes(currentTool) && !opt.target && !isPanning) {
      const pointer = wbCanvas.getPointer(opt.e);
      drawStart = pointer;
      const strokeColor = document.getElementById('wb-stroke').value;
      const fillColor = document.getElementById('wb-fill').value;
      const strokeWidth = parseInt(document.getElementById('wb-size').value);

      switch (currentTool) {
        case 'rect':
          drawShape = new fabric.Rect({
            left: pointer.x, top: pointer.y,
            width: 0, height: 0,
            fill: fillColor,
            stroke: strokeColor,
            strokeWidth: strokeWidth,
            rx: 0, ry: 0,
            transparentCorners: false,
            cornerColor: '#58a6ff',
            cornerStyle: 'circle',
          });
          break;
        case 'circle':
          drawShape = new fabric.Ellipse({
            left: pointer.x, top: pointer.y,
            rx: 0, ry: 0,
            fill: fillColor,
            stroke: strokeColor,
            strokeWidth: strokeWidth,
            transparentCorners: false,
            cornerColor: '#58a6ff',
            cornerStyle: 'circle',
          });
          break;
        case 'line':
          drawShape = new fabric.Line(
            [pointer.x, pointer.y, pointer.x, pointer.y],
            {
              stroke: strokeColor,
              strokeWidth: strokeWidth,
              transparentCorners: false,
              cornerColor: '#58a6ff',
              cornerStyle: 'circle',
            }
          );
          break;
      }
      if (drawShape) {
        wbCanvas.add(drawShape);
        wbCanvas.renderAll();
      }
    }
  });

  wbCanvas.on('mouse:move', function(opt) {
    if (drawShape && drawStart && ['rect', 'circle', 'line'].includes(currentTool)) {
      const pointer = wbCanvas.getPointer(opt.e);
      switch (currentTool) {
        case 'rect':
          const rx = Math.min(pointer.x, drawStart.x);
          const ry = Math.min(pointer.y, drawStart.y);
          drawShape.set({
            left: rx, top: ry,
            width: Math.abs(pointer.x - drawStart.x),
            height: Math.abs(pointer.y - drawStart.y),
          });
          break;
        case 'circle':
          drawShape.set({
            rx: Math.abs(pointer.x - drawStart.x) / 2,
            ry: Math.abs(pointer.y - drawStart.y) / 2,
            left: (pointer.x + drawStart.x) / 2 - Math.abs(pointer.x - drawStart.x) / 2,
            top: (pointer.y + drawStart.y) / 2 - Math.abs(pointer.y - drawStart.y) / 2,
          });
          break;
        case 'line':
          drawShape.set({ x2: pointer.x, y2: pointer.y });
          break;
      }
      wbCanvas.renderAll();
    }
  });

  wbCanvas.on('mouse:up', function(opt) {
    if (drawShape && drawStart && ['rect', 'circle', 'line'].includes(currentTool)) {
      // Remove zero-size shapes
      if (currentTool === 'rect' && (drawShape.width < 3 && drawShape.height < 3)) {
        wbCanvas.remove(drawShape);
      } else if (currentTool === 'circle' && (drawShape.rx < 3 && drawShape.ry < 3)) {
        wbCanvas.remove(drawShape);
      } else if (currentTool === 'line' && Math.abs(drawShape.x1 - drawShape.x2) < 3 && Math.abs(drawShape.y1 - drawShape.y2) < 3) {
        wbCanvas.remove(drawShape);
      } else {
        saveUndoState();
      }
      drawShape = null;
      drawStart = null;
      wbCanvas.renderAll();
    }
  });

  // ─── Text tool ────────────────────────────────────────────────────
  wbCanvas.on('mouse:dblclick', function(opt) {
    if (currentTool !== 'text') return;
    const pointer = wbCanvas.getPointer(opt.e);
    const strokeColor = document.getElementById('wb-stroke').value;
    const fontSize = parseInt(document.getElementById('wb-size').value) * 5 + 8; // scale size slider to font

    const textbox = new fabric.IText('Type here', {
      left: pointer.x,
      top: pointer.y,
      fontFamily: '"JetBrains Mono", "Fira Code", "Consolas", monospace',
      fontSize: Math.max(12, fontSize),
      fill: strokeColor,
      backgroundColor: 'transparent',
      editable: true,
      transparentCorners: false,
      cornerColor: '#58a6ff',
      cornerStyle: 'circle',
    });
    wbCanvas.add(textbox);
    wbCanvas.setActiveObject(textbox);
    textbox.enterEditing();
    saveUndoState();
  });

  // ─── Erase tool ───────────────────────────────────────────────────
  wbCanvas.on('mouse:down', function(opt) {
    if (currentTool === 'erase' && opt.target) {
      wbCanvas.remove(opt.target);
      wbCanvas.discardActiveObject().renderAll();
      saveUndoState();
    }
  });

  // ─── Undo: save state on object modification ──────────────────────
  wbCanvas.on('object:modified', function() {
    saveUndoState();
  });

  // ─── Resize handler ───────────────────────────────────────────────
  function resizeCanvas() {
    const r = container.getBoundingClientRect();
    wbCanvas.setWidth(r.width);
    wbCanvas.setHeight(r.height);
    wbCanvas.renderAll();
  }
  window.addEventListener('resize', resizeCanvas);

  // Save initial blank state
  saveUndoState();
}

function saveUndoState() {
  if (!wbCanvas) return;
  const json = JSON.stringify(wbCanvas.toJSON());
  // Remove future states if we undid and are now redoing
  if (wbHistoryIndex < wbHistory.length - 1) {
    wbHistory = wbHistory.slice(0, wbHistoryIndex + 1);
  }
  wbHistory.push(json);
  // Keep max 20
  if (wbHistory.length > 20) {
    wbHistory.shift();
  }
  wbHistoryIndex = wbHistory.length - 1;
}

function undoWhiteboard() {
  if (!wbCanvas || wbHistoryIndex <= 0) return;
  wbHistoryIndex--;
  const json = wbHistory[wbHistoryIndex];
  wbCanvas.loadFromJSON(JSON.parse(json), () => {
    wbCanvas.renderAll();
  });
}

function clearWhiteboard() {
  if (!wbCanvas) return;
  wbCanvas.clear();
  wbCanvas.backgroundColor = '#0d1117';
  wbCanvas.renderAll();
  wbHistory = [];
  wbHistoryIndex = -1;
  saveUndoState();
}

function setActiveTool(tool) {
  currentTool = tool;
  // Update toolbar button styles
  document.querySelectorAll('.wb-tool').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tool === tool);
  });

  if (!wbCanvas) return;

  // Reset drawing mode flags
  drawShape = null;
  drawStart = null;

  // Configure Fabric canvas
  if (tool === 'select') {
    wbCanvas.isDrawingMode = false;
    wbCanvas.selection = true;
    wbCanvas.defaultCursor = 'default';
  } else if (tool === 'pencil') {
    wbCanvas.isDrawingMode = true;
    wbCanvas.selection = false;
    const strokeColor = document.getElementById('wb-stroke').value;
    const strokeWidth = parseInt(document.getElementById('wb-size').value);
    wbCanvas.freeDrawingBrush.color = strokeColor;
    wbCanvas.freeDrawingBrush.width = strokeWidth;
  } else if (tool === 'erase') {
    wbCanvas.isDrawingMode = false;
    wbCanvas.selection = false;
    wbCanvas.defaultCursor = 'pointer';
  } else {
    // rect, circle, line, text — use custom mouse handlers
    wbCanvas.isDrawingMode = false;
    wbCanvas.selection = false;
    wbCanvas.defaultCursor = 'crosshair';
  }
}

function setWhiteboardMode(active) {
  isWhiteboardActive = active;
  whiteboardMode.classList.toggle('active', active);
  document.body.classList.toggle('wb-mode', active);
  modeToggle.classList.toggle('active', active);
  modeToggle.textContent = active ? '📋 Feed' : '✏️ Whiteboard';

  if (!wbCanvas && active && typeof fabric === 'undefined') {
    showToast('Whiteboard unavailable — fabric.js not loaded', 3000);
    return;
  }

  if (active && !wbCanvas) {
    // First init
    initWhiteboard();
    // Update drawing brush from current UI state
    setActiveTool(currentTool);
    // Load any existing draw cards from the feed onto the canvas
    loadDrawCardsToWhiteboard();
  }

  if (active && wbCanvas) {
    // Resize to current container
    const container = document.getElementById('wb-canvas-container');
    const rect = container.getBoundingClientRect();
    wbCanvas.setWidth(rect.width);
    wbCanvas.setHeight(rect.height);
    wbCanvas.renderAll();
  }

  // Load existing draw cards
  if (active && wbCanvas) {
    loadDrawCardsToWhiteboard();
  }

  // Update URL without reload
  const url = new URL(window.location);
  if (active) {
    url.searchParams.set('mode', 'whiteboard');
  } else {
    url.searchParams.delete('mode');
  }
  window.history.replaceState({}, '', url);
}

function loadDrawCardsToWhiteboard() {
  if (!wbCanvas) return;
  const drawCards = contentEl.querySelectorAll('.card.content-draw');
  drawCards.forEach(card => {
    // We already rendered these as SVG. For Fabric, we need the JSON shapes.
    // This is a best-effort: draw cards we created from push events will have
    // been processed by handleSSEMessage -> addShapesToWhiteboard already.
    // Here we just skip re-processing since addShapesToWhiteboard is called
    // on history load. Cards already exist as cards.
  });
}

function addShapesToWhiteboard(shapes) {
  if (typeof fabric === 'undefined') return;
  if (!shapes || !wbCanvas) return;
  if (!isWhiteboardActive) {
    // Queue for when whiteboard activates
    return;
  }

  shapes.forEach(s => {
    let obj = null;
    switch (s.type) {
      case 'rect':
        obj = new fabric.Rect({
          left: s.x, top: s.y,
          width: s.w, height: s.h,
          fill: s.fill || '#0d1117',
          stroke: s.stroke || '#58a6ff',
          strokeWidth: s['stroke-width'] || 2,
          rx: s.rx || 0, ry: s.ry || 0,
        });
        break;
      case 'circle':
        obj = new fabric.Ellipse({
          left: s.cx - s.r, top: s.cy - s.r,
          rx: s.r, ry: s.r,
          fill: s.fill || '#0d1117',
          stroke: s.stroke || '#58a6ff',
          strokeWidth: s['stroke-width'] || 2,
        });
        break;
      case 'line':
        obj = new fabric.Line([s.x1, s.y1, s.x2, s.y2], {
          stroke: s.stroke || '#58a6ff',
          strokeWidth: s['stroke-width'] || 2,
        });
        break;
      case 'arrow':
        obj = new fabric.Line([s.x1, s.y1, s.x2, s.y2], {
          stroke: s.stroke || '#58a6ff',
          strokeWidth: s['stroke-width'] || 2,
        });
        // Add arrowhead triangle
        const dx = s.x2 - s.x1, dy = s.y2 - s.y1;
        const angle = Math.atan2(dy, dx);
        const hl = Math.min(12, Math.hypot(dx, dy) * 0.3);
        const ha = Math.PI / 6;
        const ax = s.x2 - hl * Math.cos(angle - ha);
        const ay = s.y2 - hl * Math.sin(angle - ha);
        const bx = s.x2 - hl * Math.cos(angle + ha);
        const by = s.y2 - hl * Math.sin(angle + ha);
        const head = new fabric.Polygon([
          {x: s.x2, y: s.y2},
          {x: ax, y: ay},
          {x: bx, y: by},
        ], {
          fill: s.stroke || '#58a6ff',
          strokeWidth: 0,
        });
        wbCanvas.add(head);
        break;
      case 'text':
        obj = new fabric.IText(s.text || '', {
          left: s.x, top: s.y,
          fontFamily: '"JetBrains Mono", "Fira Code", "Consolas", monospace',
          fontSize: s.size || 14,
          fill: s.color || '#e6edf3',
        });
        break;
    }
    if (obj) {
      wbCanvas.add(obj);
    }
  });
  wbCanvas.renderAll();
  saveUndoState();
}

// ─── Whiteboard Toolbar Events ─────────────────────────────────────────

// Tool selection
document.querySelectorAll('.wb-tool').forEach(btn => {
  btn.addEventListener('click', () => {
    setActiveTool(btn.dataset.tool);
  });
});

// Color / size changes
document.getElementById('wb-stroke').addEventListener('input', function() {
  if (wbCanvas && wbCanvas.isDrawingMode) {
    wbCanvas.freeDrawingBrush.color = this.value;
  }
});
document.getElementById('wb-size').addEventListener('input', function() {
  if (wbCanvas && wbCanvas.isDrawingMode) {
    wbCanvas.freeDrawingBrush.width = parseInt(this.value);
  }
});

document.getElementById('wb-undo').addEventListener('click', undoWhiteboard);
document.getElementById('wb-clear').addEventListener('click', clearWhiteboard);

// ─── Mode Toggle ──────────────────────────────────────────────────────

modeToggle.addEventListener('click', () => {
  setWhiteboardMode(!isWhiteboardActive);
});

// ─── Init based on URL parameter ──────────────────────────────────────

function initFromURL() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('mode') === 'whiteboard') {
    setWhiteboardMode(true);
  }
}

// ─── Init ─────────────────────────────────────────────────────────────

// Listen for hash changes (e.g. manually navigating to #card-xxx)
window.addEventListener('hashchange', function() {
  const hash = window.location.hash;
  if (hash.startsWith('#card-')) {
    const targetId = hash.substring(1);
    let attempts = 0;
    const tryScroll = () => {
      const target = document.getElementById(targetId);
      if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
      } else if (attempts < 5) {
        attempts++;
        setTimeout(tryScroll, 200);
      }
    };
    setTimeout(tryScroll, 100);
  }
});

loadHistory().then(() => {
  connectSSE();
  initFromURL();
});
</script>
